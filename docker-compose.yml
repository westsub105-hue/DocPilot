services:
  postgres:
    image: postgres:16-alpine
    container_name: docpilot-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-docpilot}
      POSTGRES_USER: ${POSTGRES_USER:-docpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docpilot}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docpilot} -d ${POSTGRES_DB:-docpilot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: docpilot-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: docpilot-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
    container_name: docpilot-backend
    env_file:
      - ./backend/.env.example
    environment:
      POSTGRES_SERVER: postgres
      DATABASE_URL: postgresql+psycopg://docpilot:docpilot@postgres:5432/docpilot
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: docpilot-frontend
    env_file:
      - ./frontend/.env.example
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
